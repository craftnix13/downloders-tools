<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post | SaveIt.Pro</title>
  <meta name="description" content="">
  <link rel="stylesheet" href="../style.css">
  <style>
    .post-hero { padding: 48px 0 32px; background: var(--bg2); border-bottom: 1px solid var(--border); }
    .post-hero img { width: 100%; max-height: 400px; object-fit: cover; border-radius: var(--radius-lg); margin-bottom: 28px; }
    .post-meta { display: flex; align-items: center; gap: 16px; color: var(--text-muted); font-size: 0.82rem; margin-bottom: 16px; flex-wrap: wrap; }
    .post-content { max-width: 720px; }
    .post-content h1 { font-family: var(--font-display); font-size: clamp(1.75rem, 4vw, 2.75rem); font-weight: 800; letter-spacing: -0.04em; line-height: 1.1; margin-bottom: 16px; }
    .article-body { padding: 40px 0; font-size: 1rem; line-height: 1.8; color: var(--text); }
    .article-body h2 { font-family: var(--font-display); font-size: 1.4rem; font-weight: 700; margin: 32px 0 12px; }
    .article-body h3 { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; margin: 24px 0 8px; }
    .article-body p { margin-bottom: 16px; }
    .article-body ul, .article-body ol { margin: 0 0 16px 24px; }
    .article-body li { margin-bottom: 8px; }
    .article-body a { color: var(--accent); text-decoration: underline; }
    .article-body img { border-radius: var(--radius); margin: 24px 0; }
    .share-bar { display: flex; gap: 10px; flex-wrap: wrap; padding: 24px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin: 32px 0; }
    .share-bar p { color: var(--text-muted); font-size: 0.85rem; font-weight: 600; align-self: center; }
  </style>
</head>
<body>
<nav class="navbar"><div class="container navbar-inner">
  <a href="../index.html" class="logo"><div class="logo-icon">⬇️</div>Save<span>It</span>.Pro</a>
  <div class="nav-links"><a href="../index.html">Home</a><a href="blog.html">Blog</a><a href="how-to-use.html">How to Use</a></div>
  <div class="nav-actions">
    <button class="theme-toggle" id="themeToggle">☀️</button>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</div></nav>
<div class="mobile-nav" id="mobileNav"><button class="mobile-close" id="mobileClose">✕</button><a href="../index.html">🏠 Home</a><a href="blog.html">📝 Blog</a></div>

<div id="postWrap">
  <div class="post-hero"><div class="container post-content" id="postHero">
    <div class="spinner"></div>
  </div></div>
  <div class="container post-content">
    <div class="article-body" id="articleBody"></div>
    <div class="share-bar">
      <p>Share this article:</p>
      <button class="btn btn-secondary" onclick="window.open('https://twitter.com/intent/tweet?url='+encodeURIComponent(location.href),'_blank')">🐦 Twitter</button>
      <button class="btn btn-secondary" onclick="window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(location.href),'_blank')">👥 Facebook</button>
      <button class="btn btn-secondary" onclick="navigator.clipboard.writeText(location.href)">🔗 Copy Link</button>
    </div>
    <a href="blog.html" style="color:var(--accent);font-size:0.9rem">← Back to Blog</a>
  </div>
</div>

<footer><div class="container"><div class="footer-bottom"><p>© 2024 SaveIt.Pro</p><div class="footer-bottom-links"><a href="privacy-policy.html">Privacy</a><a href="../index.html">Home</a></div></div></div></footer>
<div class="toast-container"></div>

<script type="module">
const t = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', t);
document.getElementById('themeToggle').textContent = t === 'dark' ? '☀️' : '🌙';
document.getElementById('themeToggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeToggle').textContent = next === 'dark' ? '☀️' : '🌙';
});
document.getElementById('hamburger')?.addEventListener('click', () => document.getElementById('mobileNav')?.classList.add('open'));
document.getElementById('mobileClose')?.addEventListener('click', () => document.getElementById('mobileNav')?.classList.remove('open'));

const params = new URLSearchParams(location.search);
const postId = params.get('id');

if (!postId) { window.location.href = 'blog.html'; }

async function loadPost() {
  try {
    const { db } = await import('../firebase/firebase-config.js');
    const { doc, getDoc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    const snap = await getDoc(doc(db, 'blogs', postId));
    if (!snap.exists()) { document.getElementById('postHero').innerHTML = '<p>Post not found.</p>'; return; }
    const b = snap.data();
    const date = b.date ? new Date(b.date.seconds*1000).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : '';
    document.title = `${b.title} | SaveIt.Pro Blog`;
    document.querySelector('meta[name="description"]').content = b.meta_description || '';
    document.getElementById('postHero').innerHTML = `
      ${b.image ? `<img src="${b.image}" alt="${b.title}">` : ''}
      <div class="post-meta"><span>📅 ${date}</span><span class="tag">Blog</span></div>
      <h1>${b.title}</h1>
    `;
    document.getElementById('articleBody').innerHTML = b.content || '';
  } catch (e) {
    document.getElementById('postHero').innerHTML = `<p style="color:var(--danger)">Error loading post.</p>`;
  }
}
loadPost();
</script>
</body>
</html>
