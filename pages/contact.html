<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | SaveIt.Pro</title>
  <meta name="description" content="Get in touch with the SaveIt.Pro team. Report issues, ask questions or give feedback.">
  <link rel="stylesheet" href="../style.css">
  <style>
    .contact-wrap { max-width: 600px; margin: 0 auto; padding: 64px 0; }
    .contact-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 12px 16px; border-radius: var(--radius);
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      font-size: 0.9rem; outline: none; font-family: var(--font-body); transition: all 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .form-group textarea { min-height: 140px; resize: vertical; }
    .btn-submit { width: 100%; padding: 14px; border-radius: var(--radius); background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; font-weight: 700; font-size: 0.95rem; transition: all 0.2s; margin-top: 4px; }
    .btn-submit:hover { opacity: 0.85; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .success-msg { background: rgba(0,230,118,0.08); border: 1px solid rgba(0,230,118,0.3); border-radius: var(--radius); padding: 16px; color: var(--success); font-size: 0.9rem; text-align: center; display: none; margin-bottom: 16px; }
    .success-msg.show { display: block; }
  </style>
</head>
<body>
<nav class="navbar"><div class="container navbar-inner">
  <a href="../index.html" class="logo"><div class="logo-icon">⬇️</div>Save<span>It</span>.Pro</a>
  <div class="nav-links"><a href="../index.html">Home</a><a href="blog.html">Blog</a><a href="how-to-use.html">How to Use</a></div>
  <div class="nav-actions">
    <button class="theme-toggle" id="themeToggle">☀️</button>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</div></nav>
<div class="mobile-nav" id="mobileNav"><button class="mobile-close" id="mobileClose">✕</button><a href="../index.html">🏠 Home</a><a href="blog.html">📝 Blog</a></div>

<div class="container">
  <div class="contact-wrap">
    <div style="text-align:center;margin-bottom:32px">
      <span class="tag">Contact</span>
      <h1 style="font-family:var(--font-display);font-size:clamp(1.75rem,4vw,2.5rem);font-weight:800;letter-spacing:-0.04em;margin:12px 0 8px">Get in Touch</h1>
      <p style="color:var(--text-muted)">Have a question, issue, or feedback? We'd love to hear from you.</p>
    </div>

    <div class="contact-card">
      <div class="success-msg" id="successMsg">✅ Your message has been sent! We'll get back to you soon.</div>

      <div class="form-group">
        <label for="contactName">Your Name</label>
        <input type="text" id="contactName" placeholder="John Doe">
      </div>
      <div class="form-group">
        <label for="contactEmail">Email Address *</label>
        <input type="email" id="contactEmail" placeholder="john@example.com">
      </div>
      <div class="form-group">
        <label for="contactSubject">Subject</label>
        <select id="contactSubject">
          <option value="">Select a topic…</option>
          <option value="Download Issue">Download Issue</option>
          <option value="Feature Request">Feature Request</option>
          <option value="Copyright / DMCA">Copyright / DMCA</option>
          <option value="Partnership">Partnership / Advertising</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="contactMsg">Message *</label>
        <textarea id="contactMsg" placeholder="Describe your issue or question in detail…"></textarea>
      </div>
      <button class="btn-submit" id="submitBtn">Send Message</button>
    </div>
  </div>
</div>

<footer><div class="container"><div class="footer-bottom"><p>© 2024 SaveIt.Pro</p><div class="footer-bottom-links"><a href="privacy-policy.html">Privacy</a><a href="../index.html">Home</a></div></div></div></footer>
<div class="toast-container"></div>

<script type="module">
const t = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', t);
document.getElementById('themeToggle').textContent = t === 'dark' ? '☀️' : '🌙';
document.getElementById('themeToggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeToggle').textContent = next === 'dark' ? '☀️' : '🌙';
});
document.getElementById('hamburger')?.addEventListener('click', () => document.getElementById('mobileNav')?.classList.add('open'));
document.getElementById('mobileClose')?.addEventListener('click', () => document.getElementById('mobileNav')?.classList.remove('open'));

document.getElementById('submitBtn').addEventListener('click', async () => {
  const email = document.getElementById('contactEmail').value.trim();
  const msg = document.getElementById('contactMsg').value.trim();
  if (!email || !msg) { alert('Please fill in your email and message.'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  try {
    const { db } = await import('../firebase/firebase-config.js');
    const { collection, addDoc, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    await addDoc(collection(db, 'contact'), {
      name: document.getElementById('contactName').value.trim(),
      email,
      subject: document.getElementById('contactSubject').value,
      message: msg,
      timestamp: serverTimestamp(),
    });
    document.getElementById('successMsg').classList.add('show');
    document.getElementById('contactName').value = '';
    document.getElementById('contactEmail').value = '';
    document.getElementById('contactMsg').value = '';
  } catch (e) {
    alert('Failed to send. Please try again.');
  }
  btn.disabled = false;
  btn.textContent = 'Send Message';
});
</script>
</body>
</html>
