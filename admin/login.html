<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | SaveIt.Pro</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-wrap {
      width: 100%; max-width: 420px; padding: 24px;
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 40px 36px;
      box-shadow: var(--shadow);
    }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-header .logo { justify-content: center; margin-bottom: 8px; }
    .login-header p { color: var(--text-muted); font-size: 0.875rem; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input {
      width: 100%; padding: 13px 16px; border-radius: var(--radius);
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-size: 0.9rem; outline: none; transition: var(--transition);
    }
    .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .btn-login {
      width: 100%; padding: 14px; border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000; font-weight: 700; font-size: 0.95rem;
      transition: var(--transition); margin-top: 8px;
    }
    .btn-login:hover { opacity: 0.85; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error {
      background: rgba(255,71,87,0.08); border: 1px solid rgba(255,71,87,0.3);
      border-radius: var(--radius); padding: 12px 16px;
      color: var(--danger); font-size: 0.85rem; margin-bottom: 16px; display: none;
    }
    .login-error.show { display: block; }
    .back-link { text-align: center; margin-top: 20px; }
    .back-link a { font-size: 0.82rem; color: var(--text-muted); transition: var(--transition); }
    .back-link a:hover { color: var(--accent); }
    .login-bg {
      position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(0, 212, 255, 0.07) 0%, transparent 70%);
    }
  </style>
</head>
<body>
<div class="login-bg"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <a href="../index.html" class="logo">
        <div class="logo-icon">⬇️</div>
        Save<span style="color:var(--accent)">It</span>.Pro
      </a>
      <p>Admin Panel Login</p>
    </div>

    <div class="login-error" id="loginError"></div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="admin@saveit.pro" autocomplete="email">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="loginBtn">Sign In to Dashboard</button>

    <div class="back-link">
      <a href="../index.html">← Back to Website</a>
    </div>
  </div>
</div>

<script type="module">
import { auth } from '../firebase/firebase-config.js';
import { signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

// Redirect if already logged in
onAuthStateChanged(auth, user => {
  if (user) window.location.href = 'dashboard.html';
});

const loginBtn = document.getElementById('loginBtn');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const errorDiv = document.getElementById('loginError');

function showError(msg) {
  errorDiv.textContent = msg;
  errorDiv.classList.add('show');
}

async function handleLogin() {
  const email = emailInput.value.trim();
  const password = passwordInput.value;

  if (!email || !password) { showError('Please fill in all fields.'); return; }

  loginBtn.disabled = true;
  loginBtn.textContent = 'Signing in…';
  errorDiv.classList.remove('show');

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = 'dashboard.html';
  } catch (err) {
    const msgs = {
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password.',
      'auth/invalid-email': 'Invalid email address.',
      'auth/too-many-requests': 'Too many failed attempts. Please try again later.',
    };
    showError(msgs[err.code] || 'Login failed. Check your credentials.');
    loginBtn.disabled = false;
    loginBtn.textContent = 'Sign In to Dashboard';
  }
}

loginBtn.addEventListener('click', handleLogin);
document.addEventListener('keydown', e => e.key === 'Enter' && handleLogin());

// Theme
const t = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', t);
</script>
</body>
</html>
